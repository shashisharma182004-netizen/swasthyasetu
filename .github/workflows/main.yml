const EMERGENCY_SYMPTOMS_EN = ["chest pain", "chest tightness", "difficulty breathing", "unconscious", "heavy bleeding", "pregnancy complication", "stroke", "heart attack", "seizure", "overdose"];
const EMERGENCY_SYMPTOMS_HI = ["सीने में दर्द", "सांस लेने में कठिनाई", "बेहोशी", "भारी रक्तस्राव", "गर्भावस्था जटिलता"];

let currentLang = 'en';
let searchHistory = [];
let currentDisease = null;

// ==================== UI FUNCTIONS ====================

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  if (currentDisease) renderDisease(currentDisease);
}

function t(en, hi) {
  return currentLang === 'hi' ? hi : en;
}

function renderCategories() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = Object.entries(CATEGORIES).map(([cat, data]) => `
    <div class="category-card" onclick="quickSearch('${cat}')">
      <div class="category-emoji">${data.emoji}</div>
      <div class="category-name">${cat}</div>
      <div class="category-count">${data.count}</div>
    </div>
  `).join('');
}

function handleInput(val) {
  const sugg = document.getElementById('suggestions');
  if (!val.trim()) { sugg.style.display = 'none'; return; }
  
  const lower = val.toLowerCase();
  const matches = Object.values(DISEASES_DB).filter(d =>
    d.name.en.toLowerCase().includes(lower) ||
    d.name.hi.includes(val) ||
    d.category.toLowerCase().includes(lower)
  );

  if (matches.length === 0) { sugg.style.display = 'none'; return; }

  sugg.style.display = 'block';
  sugg.innerHTML = matches.slice(0, 6).map(d => `
    <div class="suggestion-item" onclick="selectSuggestion('${Object.keys(DISEASES_DB).find(k => DISEASES_DB[k] === d)}')">
      <span>${d.emoji || '🏥'}</span>
      <span>${d.name.en} / ${d.name.hi}</span>
      <span class="suggestion-cat">${d.category}</span>
    </div>
  `).join('');
}

function handleKeydown(e) {
  if (e.key === 'Enter') doSearch();
}

function selectSuggestion(key) {
  document.getElementById('searchInput').value = DISEASES_DB[key].name.en;
  document.getElementById('suggestions').style.display = 'none';
  searchDisease(key);
}

function quickSearch(term) {
  document.getElementById('searchInput').value = term;
  doSearch();
}

function doSearch() {
  const val = document.getElementById('searchInput').value.trim();
  if (!val) return;
  
  // Check emergency symptoms
  const lowerVal = val.toLowerCase();
  const isEmergency = EMERGENCY_SYMPTOMS_EN.some(s => lowerVal.includes(s));
  if (isEmergency) {
    showEmergencyAlert();
    return;
  }

  // Find in local DB
  const key = findDiseaseKey(val);
  if (key) {
    searchDisease(key);
  } else {
    searchWithAI(val);
  }
  
  document.getElementById('suggestions').style.display = 'none';
}

function findDiseaseKey(val) {
  const lower = val.toLowerCase();
  return Object.keys(DISEASES_DB).find(k => {
    const d = DISEASES_DB[k];
    return d.name.en.toLowerCase().includes(lower) ||
           d.name.hi.includes(val) ||
           k.includes(lower) ||
           lower.includes(d.name.en.toLowerCase().split(' ')[0]);
  });
}

function showEmergencyAlert() {
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'block';
  document.getElementById('welcomeState').style.display = 'none';
  resultCard.innerHTML = `
    <div style="background:linear-gradient(135deg,#7B1A1A,#C0392B);padding:40px;text-align:center;border-radius:20px;color:white;">
      <div style="font-size:64px;margin-bottom:16px;">🚨</div>
      <h2 style="font-size:28px;margin-bottom:12px;color:#FFD700;">SEEK EMERGENCY MEDICAL CARE IMMEDIATELY</h2>
      <p style="font-size:18px;margin-bottom:24px;color:rgba(255,255,255,0.9);">The symptoms you mentioned require immediate professional medical attention.</p>
      <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
        <div style="background:rgba(255,255,255,0.15);padding:16px 28px;border-radius:12px;font-size:20px;font-weight:700;">📞 Call 108</div>
        <div style="background:rgba(255,255,255,0.15);padding:16px 28px;border-radius:12px;font-size:20px;font-weight:700;">🏥 Nearest Emergency Room</div>
      </div>
    </div>
  `;
}

function searchDisease(key) {
  const disease = DISEASES_DB[key];
  currentDisease = disease;
  setLoading(false);
  document.getElementById('welcomeState').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  renderDisease(disease);
}

