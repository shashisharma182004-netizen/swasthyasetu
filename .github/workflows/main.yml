  "home_remedies_hi": ["उपाय1", "उपाय2"],
  "ayurvedic_en": ["tip1", "tip2"],
  "ayurvedic_hi": ["टिप1", "टिप2"],
  "medicine_en": "Educational medicine awareness text (NO dosages)",
  "medicine_hi": "Hindi medicine awareness",
  "prevention_en": ["tip1", "tip2", "tip3"],
  "prevention_hi": ["टिप1", "टिप2"],
  "doctor_en": "When to see doctor",
  "doctor_hi": "डॉक्टर से कब मिलें"
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Provide health information for: ${query}` }]
      })
    });

    const data = await response.json();
    setLoading(false);

    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(c => c.text || '').join('').trim();
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Convert AI response to our format
    const aiDisease = {
      name: { en: parsed.name_en, hi: parsed.name_hi },
      category: parsed.category,
      emoji: parsed.emoji || '🏥',
      icd_code: 'AI',
      overview: { en: parsed.overview_en, hi: parsed.overview_hi },
      symptoms: { en: parsed.symptoms_en, hi: parsed.symptoms_hi },
      eat: { en: parsed.eat_en, hi: parsed.eat_hi },
      avoid: { en: parsed.avoid_en, hi: parsed.avoid_hi },
      home_remedies: { en: parsed.home_remedies_en, hi: parsed.home_remedies_hi },
      ayurvedic_tips: { en: parsed.ayurvedic_en, hi: parsed.ayurvedic_hi },
      medicine_awareness: { en: parsed.medicine_en, hi: parsed.medicine_hi },
      prevention: { en: parsed.prevention_en, hi: parsed.prevention_hi },
      doctor_visit: { en: parsed.doctor_en, hi: parsed.doctor_hi }
    };

    currentDisease = aiDisease;
    renderDisease(aiDisease);

  } catch (err) {
    setLoading(false);
    showError(`Could not find information for "${query}". Please try a more specific disease name, or check your internet connection.`);
  }
}

function setLoading(show) {
  document.getElementById('loadingState').style.display = show ? 'block' : 'none';
  const btn = document.getElementById('searchBtn');
  const btnText = document.getElementById('searchBtnText');
  if (show) {
    btn.disabled = true;
    btnText.innerHTML = '<span class="spinner"></span> Searching...';
  } else {
    btn.disabled = false;
    btnText.innerHTML = '🔍 Search';
  }
}

function showError(msg) {
  document.getElementById('errorState').style.display = 'block';
  document.getElementById('errorText').textContent = msg;
  document.getElementById('resultCard').style.display = 'none';
}

function renderDisease(disease) {
  const L = currentLang;
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'block';

  const name = disease.name[L] || disease.name.en;
  const nameOther = disease.name[L === 'en' ? 'hi' : 'en'];
  const overview = disease.overview[L] || disease.overview.en;
  const symptoms = disease.symptoms[L] || disease.symptoms.en;
  const eat = disease.eat[L] || disease.eat.en;
  const avoid = disease.avoid[L] || disease.avoid.en;
  const remedies = disease.home_remedies[L] || disease.home_remedies.en;
  const ayur = disease.ayurvedic_tips[L] || disease.ayurvedic_tips.en;
  const med = typeof disease.medicine_awareness === 'object' ?
    (disease.medicine_awareness[L] || disease.medicine_awareness.en) : disease.medicine_awareness;
  const prevention = disease.prevention[L] || disease.prevention.en;
  const doctor = typeof disease.doctor_visit === 'object' ?
    (disease.doctor_visit[L] || disease.doctor_visit.en) : disease.doctor_visit;

  const labels = {
    symptoms: L === 'hi' ? ['🤒 लक्षण', 'Symptoms'] : ['🤒 Symptoms', 'लक्षण'],
    eat: L === 'hi' ? ['✅ क्या खाएं', 'Foods to Eat'] : ['✅ Foods to EAT', 'क्या खाएं'],
    avoid: L === 'hi' ? ['❌ क्या न खाएं', 'Foods to Avoid'] : ['❌ Foods to AVOID', 'क्या न खाएं'],
    remedies: L === 'hi' ? ['🌿 घरेलू उपाय', 'Home Remedies'] : ['🌿 Home Remedies', 'घरेलू उपाय'],
    ayur: L === 'hi' ? ['🪔 आयुर्वेदिक सुझाव', 'Ayurvedic Tips'] : ['🪔 Ayurvedic Tips', 'आयुर्वेदिक सुझाव'],
    med: L === 'hi' ? ['💊 दवा जागरूकता', 'Medicine Awareness'] : ['💊 Medicine Awareness', 'दवा जागरूकता'],
    prev: L === 'hi' ? ['🛡️ रोकथाम', 'Prevention'] : ['🛡️ Prevention', 'रोकथाम'],
    doctor: L === 'hi' ? ['🚨 डॉक्टर से कब मिलें', 'When to See Doctor'] : ['🚨 When to See a Doctor', 'डॉक्टर से कब मिलें'],
    overview: L === 'hi' ? '📋 रोग अवलोकन' : '📋 Disease Overview'
  };

  const listHTML = (items, bulletClass, icon) => items.map(item => `
    <li>
      <span class="item-bullet ${bulletClass}">${icon}</span>
      <span>${item}</span>
    </li>
  `).join('');

  resultCard.innerHTML = `
    <div class="disease-header">
      <div class="disease-title-block">
        <div class="disease-name">${name}</div>
        <div class="disease-name-hindi">${nameOther}</div>
        <div class="disease-meta">
          ${disease.icd_code && disease.icd_code !== 'AI' ? `<span class="meta-badge meta-icd">ICD: ${disease.icd_code}</span>` : '<span class="meta-badge meta-icd">AI Generated</span>'}
          <span class="meta-badge meta-cat">${disease.category}</span>
        </div>
      </div>
      <div class="disease-emoji">${disease.emoji || '🏥'}</div>
    </div>

    <div class="disease-overview">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--saffron);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">${labels.overview}</div>
      <p class="overview-text">${overview}</p>
    </div>

    <div class="sections-grid">
      
      <!-- SYMPTOMS -->
      <div class="section-block section-symptoms">
        <div class="section-header">
          <div class="section-icon">🤒</div>
          <div>
            <div class="section-title" style="color:#B8860B;">${labels.symptoms[0]}</div>
            <span class="section-title-hindi">${labels.symptoms[1]}</span>
          </div>
        </div>
        <ul class="item-list">${listHTML(symptoms, 'default-bullet', '•')}</ul>
      </div>

      <!-- PREVENTION -->
      <div class="section-block section-prevention">
        <div class="section-header">
          <div class="section-icon">🛡️</div>
          <div>
            <div class="section-title" style="color:var(--prev-color);">${labels.prev[0]}</div>
            <span class="section-title-hindi">${labels.prev[1]}</span>
          </div>
        </div>
        <ul class="item-list">${listHTML(prevention, 'default-bullet', '✓')}</ul>
      </div>

      <!-- EAT -->
      <div class="section-block section-eat">
        <div class="section-header">
          <div class="section-icon">🥗</div>
          <div>
            <div class="section-title">${labels.eat[0]}</div>
            <span class="section-title-hindi">${labels.eat[1]}</span>
          </div>
        </div>
        <ul class="item-list">${listHTML(eat, 'eat-bullet', '✓')}</ul>
      </div>

      <!-- AVOID -->
      <div class="section-block section-avoid">
        <div class="section-header">
          <div class="section-icon">🚫</div>
          <div>
            <div class="section-title">${labels.avoid[0]}</div>
            <span class="section-title-hindi">${labels.avoid[1]}</span>
          </div>
        </div>
        <ul class="item-list">${listHTML(avoid, 'avoid-bullet', '✗')}</ul>
      </div>

      <!-- HOME REMEDIES -->
      <div class="section-block section-remedies">
        <div class="section-header">
          <div class="section-icon">🌿</div>
          <div>
            <div class="section-title">${labels.remedies[0]}</div>
            <span class="section-title-hindi">${labels.remedies[1]}</span>
          </div>
        </div>
        <ul class="item-list">${listHTML(remedies, 'default-bullet', '🌿')}</ul>
      </div>

      <!-- AYURVEDA -->
      <div class="section-block section-ayurveda">
        <div class="section-header">
          <div class="section-icon">🪔</div>
          <div>
            <div class="section-title">${labels.ayur[0]}</div>
            <span class="section-title-hindi">${labels.ayur[1]}</span>
          </div>
        </div>
        <ul class="item-list">${listHTML(ayur, 'default-bullet', '🕉')}</ul>
      </div>

    </div>

    <!-- MEDICINE AWARENESS (full width) -->
    <div class="section-full section-medicine">
      <div class="section-header">
        <div class="section-icon" style="background:rgba(26,95,122,0.12);">💊</div>
        <div>
          <div class="section-title" style="color:var(--med-color);">${labels.med[0]}</div>
          <span class="section-title-hindi">${labels.med[1]}</span>
        </div>
      </div>
      <div class="medicine-text">${med}</div>
    </div>

    <!-- DOCTOR VISIT (full width) -->
    <div class="section-full section-doctor">
      <div class="section-header">
        <div class="section-icon" style="background:rgba(198,40,40,0.12);">🚨</div>
        <div>
          <div class="section-title" style="color:var(--doctor-color);">${labels.doctor[0]}</div>
          <span class="section-title-hindi">${labels.doctor[1]}</span>
        </div>
      </div>
      <div class="doctor-alert">${doctor}</div>
    </div>

    <!-- DISCLAIMER -->
    <div class="disclaimer-block">
      <div class="disclaimer-icon">⚠️</div>
      <div class="disclaimer-text">
        <strong>Medical Disclaimer / चिकित्सा अस्वीकरण:</strong>
        ${L === 'hi' 
          ? 'यह जानकारी केवल शैक्षणिक उद्देश्यों के लिए है और पेशेवर चिकित्सा सलाह का विकल्प नहीं है। निदान और उपचार के लिए हमेशा एक योग्य डॉक्टर से परामर्श करें।'
          : 'This information is for educational purposes only and does not replace professional medical advice. Always consult a qualified doctor or healthcare provider for diagnosis and treatment. Emergency symptoms require immediate medical attention.'
        }
      </div>
    </div>
  `;

  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ==================== INIT ====================
renderCategories();

// Close suggestions on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container')) {
    document.getElementById('suggestions').style.display = 'none';
  }
});
</script>
</body>
</html>
