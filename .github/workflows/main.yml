<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwasthyaSetu AI – Trustworthy Health Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Crimson+Pro:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --saffron: #E8721C;
  --saffron-light: #F5A04A;
  --green-india: #138808;
  --green-light: #1EA80A;
  --cream: #FDF6EC;
  --cream-dark: #F5E8D3;
  --ink: #1A1208;
  --ink-soft: #3D2B0F;
  --white: #FFFDF9;
  --border: rgba(232,114,28,0.25);
  --shadow: 0 4px 24px rgba(232,114,28,0.12);
  --shadow-lg: 0 16px 64px rgba(26,18,8,0.18);
  --red-alert: #C0392B;
  --card-bg: rgba(255,253,249,0.95);
  --eat-color: #138808;
  --avoid-color: #C0392B;
  --remedy-color: #8B5E0A;
  --ayur-color: #5B3A8F;
  --med-color: #1A5F7A;
  --prev-color: #2E7D32;
  --doctor-color: #C62828;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background Pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232,114,28,0.08) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23E8721C' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  z-index: -1;
  pointer-events: none;
}

/* HEADER */
header {
  background: linear-gradient(135deg, var(--ink) 0%, #2A1A06 100%);
  color: var(--cream);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  border-bottom: 1px solid rgba(232,114,28,0.3);
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: var(--saffron);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 16px rgba(232,114,28,0.4);
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-main {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--saffron-light), var(--cream));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.logo-tagline {
  font-size: 11px;
  color: rgba(255,253,249,0.6);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

.lang-toggle {
  display: flex;
  background: rgba(255,253,249,0.08);
  border-radius: 24px;
  padding: 3px;
  border: 1px solid rgba(232,114,28,0.3);
}

.lang-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: none;
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.25s;
  color: rgba(255,253,249,0.7);
  background: transparent;
}

.lang-btn.active {
  background: var(--saffron);
  color: white;
  font-weight: 600;
}

.disclaimer-badge {
  background: rgba(192,57,43,0.2);
  border: 1px solid rgba(192,57,43,0.4);
  color: #F5A04A;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
}

/* HERO SEARCH */
.hero {
  padding: 48px 32px 36px;
  text-align: center;
  max-width: 900px;
  margin: 0 auto;
}

.hero-title {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 12px;
}

.hero-title span {
  color: var(--saffron);
}

.hero-subtitle {
  font-size: 18px;
  color: var(--ink-soft);
  margin-bottom: 32px;
  font-style: italic;
}

.search-container {
  position: relative;
  max-width: 700px;
  margin: 0 auto;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--white);
  border: 2px solid var(--saffron);
  border-radius: 16px;
  padding: 4px 4px 4px 20px;
  box-shadow: var(--shadow-lg), 0 0 0 4px rgba(232,114,28,0.08);
  transition: box-shadow 0.3s;
}

.search-box:focus-within {
  box-shadow: var(--shadow-lg), 0 0 0 6px rgba(232,114,28,0.15);
}

.search-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: 'Crimson Pro', serif;
  font-size: 18px;
  color: var(--ink);
  background: transparent;
  padding: 12px 0;
}

.search-input::placeholder { color: rgba(61,43,15,0.4); }

.search-btn {
  background: var(--saffron);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 24px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.25s;
  white-space: nowrap;
  font-family: 'Crimson Pro', serif;
}

.search-btn:hover {
  background: var(--ink);
  transform: translateY(-1px);
}

.search-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.suggestions {
  position: absolute;
  top: calc(100% + 8px);
  left: 0; right: 0;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  overflow: hidden;
  max-height: 300px;
  overflow-y: auto;
}

.suggestion-item {
  padding: 12px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s;
  font-size: 16px;
}

.suggestion-item:hover { background: var(--cream); }
.suggestion-item:last-child { border-bottom: none; }

.suggestion-cat {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--saffron);
  background: rgba(232,114,28,0.1);
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* QUICK CATEGORIES */
.quick-cats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 20px;
}

.quick-cat-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--ink-soft);
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.quick-cat-btn:hover {
  border-color: var(--saffron);
  background: rgba(232,114,28,0.08);
  color: var(--saffron);
}

/* EMERGENCY BANNER */
.emergency-banner {
  background: linear-gradient(135deg, #7B1A1A, #C0392B);
  color: white;
  padding: 14px 32px;
  text-align: center;
  font-size: 14px;
  border-top: 3px solid #FF6B6B;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.3px;
}

.emergency-banner strong { color: #FFD700; }

/* MAIN CONTENT */
.main-content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* LOADING */
.loading-state {
  text-align: center;
  padding: 80px 32px;
  display: none;
}

.loading-dots {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
}

.loading-dot {
  width: 14px; height: 14px;
  background: var(--saffron);
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

.loading-text { font-size: 18px; color: var(--ink-soft); font-style: italic; }

/* RESULT CARD */
.result-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.5s ease-out;
  display: none;
  margin-top: 8px;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.disease-header {
  background: linear-gradient(135deg, var(--ink) 0%, #2A1A06 100%);
  padding: 28px 36px;
  color: white;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.disease-title-block {}

.disease-name {
  font-size: 30px;
  font-weight: 700;
  color: var(--saffron-light);
  line-height: 1.1;
}

.disease-name-hindi {
  font-size: 20px;
  color: rgba(255,253,249,0.7);
  font-family: 'Tiro Devanagari Hindi', serif;
  margin-top: 4px;
}

.disease-meta {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.meta-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.meta-icd { background: rgba(232,114,28,0.25); color: var(--saffron-light); }
.meta-cat { background: rgba(19,136,8,0.25); color: #4ADE80; }

.disease-emoji { font-size: 56px; line-height: 1; flex-shrink: 0; }

.disease-overview {
  padding: 24px 36px;
  border-bottom: 1px solid var(--border);
  background: rgba(232,114,28,0.04);
}

.overview-text {
  font-size: 17px;
  line-height: 1.7;
  color: var(--ink-soft);
}

/* SECTIONS GRID */
.sections-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

@media (max-width: 768px) {
  .sections-grid { grid-template-columns: 1fr; }
  .disease-header { flex-direction: column; }
  .header-top { padding: 12px 16px; }
  .hero { padding: 32px 16px 24px; }
  .main-content { padding: 0 12px 40px; }
}

.section-block {
  padding: 24px 28px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

.section-block:nth-child(even) { border-right: none; }
.section-block:last-child,
.section-block:nth-last-child(2):nth-child(odd) { border-bottom: none; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.section-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

.section-title-hindi {
  font-size: 12px;
  font-family: 'Tiro Devanagari Hindi', serif;
  font-weight: 400;
  opacity: 0.7;
  display: block;
}

/* Section specific colors */
.section-symptoms .section-icon { background: rgba(255,165,0,0.15); }
.section-symptoms .section-title { color: #B8860B; }

.section-eat .section-icon { background: rgba(19,136,8,0.12); }
.section-eat .section-title { color: var(--eat-color); }

.section-avoid .section-icon { background: rgba(192,57,43,0.1); }
.section-avoid .section-title { color: var(--avoid-color); }

.section-remedies .section-icon { background: rgba(139,94,10,0.12); }
.section-remedies .section-title { color: var(--remedy-color); }

.section-ayurveda .section-icon { background: rgba(91,58,143,0.1); }
.section-ayurveda .section-title { color: var(--ayur-color); }

.section-medicine .section-icon { background: rgba(26,95,122,0.1); }
.section-medicine .section-title { color: var(--med-color); }

.section-prevention .section-icon { background: rgba(46,125,50,0.1); }
.section-prevention .section-title { color: var(--prev-color); }

.section-doctor .section-icon { background: rgba(198,40,40,0.1); }
.section-doctor .section-title { color: var(--doctor-color); }

/* Content items */
.item-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

.item-list li {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-soft);
}

.item-bullet {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 2px;
}

.eat-bullet { background: rgba(19,136,8,0.15); color: var(--eat-color); }
.avoid-bullet { background: rgba(192,57,43,0.12); color: var(--avoid-color); }
.default-bullet { background: rgba(232,114,28,0.15); color: var(--saffron); }

.medicine-text {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-soft);
  background: rgba(26,95,122,0.05);
  padding: 14px;
  border-radius: 10px;
  border-left: 3px solid var(--med-color);
}

.doctor-alert {
  background: rgba(192,57,43,0.08);
  border: 1.5px solid rgba(192,57,43,0.3);
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--doctor-color);
  font-weight: 500;
}

/* FULL WIDTH SECTIONS */
.section-full {
  padding: 24px 36px;
  border-bottom: 1px solid var(--border);
}

/* DISCLAIMER */
.disclaimer-block {
  background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
  border-top: 3px solid var(--saffron);
  padding: 20px 36px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.disclaimer-icon { font-size: 24px; flex-shrink: 0; }

.disclaimer-text {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.6;
  font-style: italic;
}

.disclaimer-text strong { color: var(--saffron); font-style: normal; }

/* WELCOME STATE */
.welcome-state {
  padding: 40px 24px;
}

.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-top: 32px;
}

.category-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.category-card:hover {
  border-color: var(--saffron);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  background: rgba(232,114,28,0.04);
}

.category-emoji { font-size: 36px; }

.category-name {
  font-weight: 600;
  font-size: 15px;
  color: var(--ink);
}

.category-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--saffron);
  background: rgba(232,114,28,0.1);
  padding: 3px 10px;
  border-radius: 10px;
}

.section-heading {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
  text-align: center;
}

.section-subheading {
  text-align: center;
  color: var(--ink-soft);
  font-size: 16px;
  margin-bottom: 4px;
  font-style: italic;
}

/* SPINNER */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR STATE */
.error-state {
  background: rgba(192,57,43,0.06);
  border: 1.5px solid rgba(192,57,43,0.3);
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  display: none;
  margin-top: 16px;
}

.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-text { font-size: 18px; color: var(--ink-soft); }

/* AI CONTENT */
.ai-content h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  margin: 12px 0 6px;
}

.ai-content p {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-soft);
  margin-bottom: 8px;
}

.ai-content ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 8px;
}

.ai-content ul li {
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-soft);
  padding-left: 20px;
  position: relative;
}

.ai-content ul li::before {
  content: '•';
  color: var(--saffron);
  position: absolute;
  left: 6px;
}

/* Chat history */
.chat-history {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: 8px;
}

/* SEARCH HISTORY TAG */
.search-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
  justify-content: center;
}

.search-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink-soft);
}

.search-tag:hover {
  border-color: var(--saffron);
  background: rgba(232,114,28,0.06);
  color: var(--saffron);
}

.tag-remove {
  font-size: 16px;
  line-height: 1;
  opacity: 0.5;
}

.tag-remove:hover { opacity: 1; color: red; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">
        <span class="logo-main">SwasthyaSetu AI</span>
        <span class="logo-tagline">Trustworthy Health Guidance · स्वास्थ्य सेतु</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('hi')">हिंदी</button>
      </div>
      <div class="disclaimer-badge">🩺 Educational Only</div>
    </div>
  </div>
  <div class="emergency-banner">
    ⚠️ <strong>EMERGENCY:</strong> Chest pain · Breathing difficulty · Unconsciousness · Heavy bleeding · Pregnancy complications → 
    <strong>Call 108 / Go to Emergency Room IMMEDIATELY</strong>
  </div>
</header>

<div class="hero">
  <h1 class="hero-title">
    Your <span>AI Health Guide</span><br>for Every Indian Home
  </h1>
  <p class="hero-subtitle">Diet plans, home remedies & health awareness — in your language</p>
  
  <div class="search-container">
    <div class="search-box">
      <input 
        type="text" 
        class="search-input" 
        id="searchInput"
        placeholder="Search disease, e.g. Diabetes, Thyroid, Acidity..."
        autocomplete="off"
        oninput="handleInput(this.value)"
        onkeydown="handleKeydown(event)"
      >
      <button class="search-btn" id="searchBtn" onclick="doSearch()">
        <span id="searchBtnText">🔍 Search</span>
      </button>
    </div>
    <div class="suggestions" id="suggestions" style="display:none;"></div>
  </div>

  <div class="quick-cats">
    <button class="quick-cat-btn" onclick="quickSearch('Diabetes')">🍬 Diabetes</button>
    <button class="quick-cat-btn" onclick="quickSearch('Hypertension')">❤️ BP</button>
    <button class="quick-cat-btn" onclick="quickSearch('Acidity')">🔥 Acidity</button>
    <button class="quick-cat-btn" onclick="quickSearch('Thyroid')">🦋 Thyroid</button>
