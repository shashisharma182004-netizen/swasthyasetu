    "id": "DB005", "icd_code": "D50", "category": "Blood Disorders",
    "name": {"en": "Iron Deficiency Anemia", "hi": "लौह तत्व की कमी (एनीमिया)"},
    "emoji": "🩸",
    "overview": {"en": "A common condition where blood lacks enough healthy red blood cells due to iron deficiency, common in women and children in India.", "hi": "एक सामान्य स्थिति जिसमें आयरन की कमी के कारण रक्त में पर्याप्त लाल रक्त कोशिकाएं नहीं होतीं, भारत में महिलाओं और बच्चों में आम।"},
    "symptoms": {"en": ["Fatigue and weakness", "Pale skin and inner eyelids", "Shortness of breath on exertion", "Dizziness and lightheadedness", "Cold hands and feet", "Brittle nails and hair loss"], "hi": ["थकान और कमज़ोरी", "पीली त्वचा और आंखें", "परिश्रम पर सांस फूलना", "चक्कर आना", "ठंडे हाथ-पैर", "कमज़ोर नाखून और बाल झड़ना"]},
    "eat": {"en": ["Spinach (palak) - rich in iron and folate", "Pomegranate (anar) - iron + vitamin C combo", "Beetroot (chukandar) - iron, folate, boosts hemoglobin", "Jaggery (gur) - natural plant-based iron", "Dates (khajoor) - iron and energy", "Sesame seeds (til) with jaggery - traditional iron tonic"], "hi": ["पालक - आयरन और फोलेट युक्त", "अनार - आयरन + विटामिन C", "चुकंदर - आयरन, फोलेट, हीमोग्लोबिन बढ़ाता है", "गुड़ - प्राकृतिक पौधे-आधारित आयरन", "खजूर - आयरन और ऊर्जा", "तिल और गुड़ - पारंपरिक आयरन टॉनिक"]},
    "avoid": {"en": ["Tea/coffee with meals - inhibits iron absorption significantly", "Calcium-rich foods simultaneously with iron-rich meals", "Excess wheat bran (phytates block absorption)", "Antacids (reduce iron absorption)"], "hi": ["भोजन के साथ चाय/कॉफी - आयरन अवशोषण रोकता है", "आयरन युक्त भोजन के साथ कैल्शियम युक्त खाद्य पदार्थ", "अत्यधिक गेहूं का चोकर", "एंटासिड"]},
    "home_remedies": {"en": ["Pomegranate juice with a pinch of rock salt and mishri daily", "Beetroot + carrot juice every morning", "Soak 10 raisins overnight, eat with soaking water", "Gur-chana (jaggery with roasted chickpeas) as daily snack"], "hi": ["रोज़ अनार का रस सेंधा नमक और मिश्री के साथ", "हर सुबह चुकंदर और गाजर का रस", "10 किशमिश रात भर भिगोकर सुबह खाएं", "रोज़ गुड़-चना स्नैक के रूप में"]},
    "ayurvedic_tips": {"en": ["Punarnava (Boerhavia diffusa) - traditional blood builder", "Cook food in iron vessels - increases iron content naturally", "Dhatri Loha or Navayasa Churna - consult Ayurvedic vaidya"], "hi": ["पुनर्नवा - रक्त निर्माण में सहायक", "लोहे के बर्तन में पकाने से खाने में आयरन बढ़ता है", "धात्री लोह या नवायस चूर्ण - वैद्य से परामर्श"]},
    "medicine_awareness": {"en": "Ferrous Sulfate or Ferrous Gluconate tablets are standard iron supplements. Take with Vitamin C (lemon water) for better absorption. Common side effects: dark stools, constipation, nausea. Treatment duration typically 3-6 months. Don't self-prescribe.", "hi": "फेरस सल्फेट या फेरस ग्लूकोनेट सामान्य आयरन सप्लीमेंट। विटामिन C के साथ बेहतर अवशोषण। दुष्प्रभाव: काले मल, कब्ज, मतली। उपचार 3-6 महीने।"},
    "prevention": {"en": ["Eat iron-rich foods daily (dal, leafy greens, gur)", "Pair iron foods with vitamin C always", "Regular hemoglobin checkups (especially women)", "Deworm children regularly", "Fortified foods awareness"], "hi": ["रोज़ आयरन युक्त खाद्य पदार्थ खाएं", "आयरन खाद्य पदार्थ को हमेशा विटामिन C के साथ लें", "नियमित हीमोग्लोबिन जांच (विशेषकर महिलाएं)", "बच्चों में नियमित कृमि उपचार"]},
    "doctor_visit": {"en": "See doctor if: Extreme fatigue causing inability to work, fainting, irregular heartbeat, hemoglobin below 8 g/dL, persistent symptoms despite diet changes.", "hi": "डॉक्टर से मिलें अगर: काम न कर पाने की थकान, बेहोशी, अनियमित दिल की धड़कन, हीमोग्लोबिन 8 g/dL से कम।"}
  },
  "thyroid": {
    "id": "DB006", "icd_code": "E03", "category": "Endocrine",
    "name": {"en": "Hypothyroidism (Underactive Thyroid)", "hi": "हाइपोथायरायडिज्म (थायरॉइड की कमी)"},
    "emoji": "🦋",
    "overview": {"en": "A condition where the thyroid gland doesn't produce enough thyroid hormone, causing metabolism to slow down significantly.", "hi": "एक स्थिति जिसमें थायरॉइड ग्रंथि पर्याप्त हार्मोन नहीं बनाती, जिससे चयापचय धीमा हो जाता है।"},
    "symptoms": {"en": ["Unexplained weight gain", "Fatigue and sluggishness", "Cold intolerance", "Constipation", "Dry skin and brittle hair/nails", "Depression and memory problems", "Slow heart rate"], "hi": ["अस्पष्टीकृत वज़न वृद्धि", "थकान और सुस्ती", "ठंड न सह पाना", "कब्ज", "रूखी त्वचा और कमज़ोर बाल/नाखून", "अवसाद और याददाश्त की समस्या", "धीमी हृदय गति"]},
    "eat": {"en": ["Iodized salt - essential for thyroid hormone production", "Selenium-rich: Brazil nuts (2/day), sunflower seeds", "Zinc-rich: pumpkin seeds, chickpeas, lentils", "Vitamin D: sunlight 20 mins, fortified milk, eggs", "Coconut oil - medium chain fatty acids support thyroid", "Fish (if non-vegetarian) - iodine and omega-3"], "hi": ["आयोडाइज्ड नमक - थायरॉइड हार्मोन उत्पादन के लिए आवश्यक", "सेलेनियम: ब्राजील नट (2/दिन), सूरजमुखी के बीज", "जिंक: कद्दू के बीज, चना, दाल", "विटामिन D: 20 मिनट धूप, फोर्टिफाइड दूध, अंडे", "नारियल तेल - थायरॉइड कार्य में सहायक", "मछली - आयोडीन और ओमेगा-3"]},
    "avoid": {"en": ["Raw cruciferous vegetables in excess (cabbage, broccoli, cauliflower - goitrogens affect iodine)", "Cook these vegetables to reduce goitrogen content", "Soy products in excess", "Gluten (if Hashimoto's thyroiditis diagnosed)", "Processed and packaged foods"], "hi": ["कच्ची क्रूसिफेरस सब्जियां अधिक मात्रा में (गोभी, ब्रोकली - आयोडीन प्रभावित)", "इन्हें पकाने से गोइट्रोजेन कम होता है", "सोया उत्पाद अधिक मात्रा में", "ग्लूटेन (हाशिमोटो होने पर)", "प्रोसेस्ड खाद्य पदार्थ"]},
    "home_remedies": {"en": ["Ashwagandha milk: 1 tsp ashwagandha powder in warm milk daily", "Coconut oil in cooking (1-2 tbsp daily)", "Adequate sleep (7-8 hours) - critical for hormone balance", "Regular gentle exercise - walking, yoga"], "hi": ["अश्वगंधा दूध: 1 चम्मच अश्वगंधा पाउडर गर्म दूध में रोज़", "खाना पकाने में नारियल तेल (1-2 चम्मच)", "पर्याप्त नींद (7-8 घंटे)", "नियमित हल्का व्यायाम - चलना, योग"]},
    "ayurvedic_tips": {"en": ["Kanchanar Guggulu - specific classical remedy for thyroid", "Guggulu helps clear ama (toxins) from thyroid region", "Avoid Kapha-increasing foods (excess dairy, sweets, cold foods)"], "hi": ["कंचनार गुग्गुलु - थायरॉइड के लिए विशेष क्लासिक उपाय", "गुग्गुलु थायरॉइड क्षेत्र से आम (विषाक्त पदार्थ) साफ करता है", "कफ बढ़ाने वाले खाद्य पदार्थ से बचें"]},
    "medicine_awareness": {"en": "Levothyroxine (LT4) - synthetic thyroid hormone - is the standard treatment. Must be taken on empty stomach, 30-60 minutes before breakfast. Regular TSH blood tests every 3-6 months. NEVER stop without doctor's advice - can cause serious complications.", "hi": "लेवोथायरोक्सिन - सिंथेटिक थायरॉइड हार्मोन - मानक उपचार। खाली पेट, नाश्ते से 30-60 मिनट पहले लें। हर 3-6 महीने TSH परीक्षण। डॉक्टर की सलाह के बिना कभी बंद न करें।"},
    "prevention": {"en": ["Ensure adequate iodine intake through iodized salt", "Regular thyroid function tests (TSH) after 30 years", "Avoid unnecessary neck radiation", "Manage stress (key thyroid trigger)", "Know your family history"], "hi": ["आयोडाइज्ड नमक से पर्याप्त आयोडीन सुनिश्चित करें", "30 साल के बाद नियमित TSH परीक्षण", "गर्दन पर अनावश्यक विकिरण से बचें", "तनाव प्रबंधन करें", "पारिवारिक इतिहास जानें"]},
    "doctor_visit": {"en": "See doctor if: Unexplained rapid weight gain, severe fatigue, swelling in neck/throat (goiter), very slow heart rate, severe depression, or TSH above 10.", "hi": "डॉक्टर से मिलें अगर: अस्पष्टीकृत वज़न वृद्धि, गंभीर थकान, गर्दन में सूजन (घेंघा), बहुत धीमी हृदय गति, गंभीर अवसाद, TSH 10 से अधिक।"}
  },
  "arthritis": {
    "id": "DB007", "icd_code": "M06", "category": "Musculoskeletal",
    "name": {"en": "Arthritis (Joint Pain)", "hi": "गठिया (जोड़ों का दर्द)"},
    "emoji": "🦴",
    "overview": {"en": "Inflammation of joints causing pain, stiffness, and reduced mobility. Two main types: Osteoarthritis (wear and tear) and Rheumatoid Arthritis (autoimmune).", "hi": "जोड़ों में सूजन जिससे दर्द, अकड़न और गतिशीलता कम होती है। दो मुख्य प्रकार: ऑस्टियोआर्थराइटिस और रूमेटाइड आर्थराइटिस।"},
    "symptoms": {"en": ["Joint pain, swelling, warmth", "Morning stiffness (lasting >1 hour in RA)", "Reduced range of motion", "Redness around joints", "Fatigue (especially in RA)", "Joint deformity in advanced cases"], "hi": ["जोड़ दर्द, सूजन, गर्माहट", "सुबह की अकड़न (RA में >1 घंटा)", "गतिशीलता में कमी", "जोड़ों के आसपास लालिमा", "थकान (RA में विशेष)", "जोड़ विकृति गंभीर मामलों में"]},
    "eat": {"en": ["Turmeric with black pepper - curcumin reduces inflammation", "Ginger tea daily - potent anti-inflammatory", "Flaxseeds and walnuts (akhrot) - omega-3 fatty acids", "Green leafy vegetables - antioxidants", "Garlic - sulfur compounds reduce joint inflammation", "Whole grains and fiber-rich foods"], "hi": ["काली मिर्च के साथ हल्दी - करक्यूमिन सूजन कम करता है", "रोज़ अदरक की चाय", "अलसी और अखरोट - ओमेगा-3", "हरी पत्तेदार सब्जियां - एंटीऑक्सीडेंट", "लहसुन - जोड़ सूजन कम करता है", "साबुत अनाज और फाइबर"]},
    "avoid": {"en": ["Fried and deep-fried foods (pro-inflammatory)", "Red meat and processed meat", "Refined sugars and white flour", "Alcohol (increases inflammation)", "Excess salt (causes fluid retention)", "Nightshades (tomato, eggplant, peppers) - debated but some patients report relief avoiding them"], "hi": ["तले हुए खाद्य पदार्थ (सूजन बढ़ाते हैं)", "लाल और प्रोसेस्ड मांस", "परिष्कृत चीनी और मैदा", "शराब (सूजन बढ़ाती है)", "अधिक नमक", "नाइटशेड (टमाटर, बैंगन)"]},
    "home_remedies": {"en": ["Turmeric + ginger paste warm compress on affected joints", "Warm mustard oil massage with garlic - twice daily", "Epsom salt (sendha namak) warm water soak for hands/feet", "Castor oil (arandi) massage with warm cloth compress"], "hi": ["हल्दी-अदरक पेस्ट का प्रभावित जोड़ों पर गर्म सेक", "लहसुन के साथ गर्म सरसों के तेल की मालिश दिन में दो बार", "सेंधा नमक गर्म पानी में हाथ-पैर भिगोना", "गर्म कपड़े के सेक के साथ अरंडी के तेल की मालिश"]},
    "ayurvedic_tips": {"en": ["Shallaki (Boswellia serrata) - clinically proven anti-inflammatory for joints", "Maharasnadi Kwath - classical for joint disorders", "Guggulu formulations - anti-inflammatory", "Daily Abhyanga (warm sesame oil massage) before bath"], "hi": ["शल्लकी (बोसवेलिया) - जोड़ों के लिए सिद्ध सूजन रोधी", "महारास्नादि क्वाथ - जोड़ विकारों के लिए क्लासिक", "गुग्गुलु फॉर्मूलेशन - सूजन रोधी", "नहाने से पहले रोज़ अभ्यंग (गर्म तिल तेल मालिश)"]},
    "medicine_awareness": {"en": "NSAIDs (Ibuprofen, Naproxen - reduce pain/inflammation), DMARDs for RA (Methotrexate - slow disease progression), Corticosteroids (short-term flare control). Long-term NSAID use can cause stomach ulcers and kidney issues. Always use with doctor supervision.", "hi": "NSAIDs (दर्द/सूजन कम करते हैं), DMARDs (RA में रोग प्रगति धीमी करते हैं), कॉर्टिकोस्टेरॉइड। दीर्घकालिक NSAIDs से पेट के अल्सर और गुर्दे की समस्या हो सकती है।"},
    "prevention": {"en": ["Maintain healthy weight (reduces joint stress)", "Low-impact exercise: swimming, cycling, yoga", "Protect joints from repeated injuries", "Anti-inflammatory diet consistently", "Regular checkups if family history exists"], "hi": ["स्वस्थ वज़न बनाएं (जोड़ों पर कम दबाव)", "कम प्रभाव वाला व्यायाम: तैराकी, साइकिलिंग, योग", "जोड़ों को बार-बार की चोट से बचाएं", "नियमित रूप से सूजन रोधी आहार", "पारिवारिक इतिहास हो तो नियमित जांच"]},
    "doctor_visit": {"en": "See doctor if: Sudden severe joint pain, fever with joint swelling, joint deformity developing, inability to walk or use hands, pain at rest or night.", "hi": "डॉक्टर से मिलें अगर: अचानक तेज जोड़ दर्द, जोड़ सूजन के साथ बुखार, जोड़ विकृति विकसित हो, चलने या हाथ उपयोग में असमर्थता।"}
  },
  "obesity": {
    "id": "DB008", "icd_code": "E66", "category": "Metabolic",
    "name": {"en": "Obesity / Overweight", "hi": "मोटापा / अधिक वज़न"},
    "emoji": "⚖️",
    "overview": {"en": "Excess accumulation of body fat that increases health risks. Obesity is defined as BMI ≥30. It raises risk for diabetes, heart disease, and joint problems.", "hi": "शरीर में अत्यधिक वसा संचय जो स्वास्थ्य जोखिम बढ़ाता है। BMI ≥30 को मोटापा कहते हैं।"},
    "symptoms": {"en": ["Excess body weight", "Shortness of breath on minimal exertion", "Joint pain (especially knees, hips)", "Fatigue and low energy", "Sleep apnea (snoring, interrupted sleep)", "Increased sweating", "Low self-esteem"], "hi": ["अधिक शरीर भार", "थोड़े परिश्रम पर सांस फूलना", "जोड़ दर्द (घुटने, कूल्हे)", "थकान और कम ऊर्जा", "नींद में सांस रुकना", "अधिक पसीना", "कम आत्मसम्मान"]},
    "eat": {"en": ["Moong dal (green gram) - high protein, very low calorie", "Methi leaves - boosts metabolism, reduces appetite", "Jeera (cumin) water on empty stomach daily - fat burning", "Green vegetables (bottle gourd, ridge gourd, spinach) - filling", "Buttermilk (chaas) - probiotic, low calorie, filling", "Chia seeds in water - fiber, appetite control"], "hi": ["मूंग दाल - उच्च प्रोटीन, बहुत कम कैलोरी", "मेथी के पत्ते - चयापचय बढ़ाते हैं, भूख कम करते हैं", "खाली पेट जीरे का पानी", "हरी सब्जियां (लौकी, तोरी, पालक)", "छाछ - प्रोबायोटिक, कम कैलोरी", "चिया बीज पानी में - फाइबर, भूख नियंत्रण"]},
    "avoid": {"en": ["Maida products (bread, naan, biscuits, namkeen)", "Sugary beverages (cold drinks, packaged juices)", "Deep fried snacks (samosa, pakora, chips)", "Packaged and ultra-processed foods", "White rice and potato in large quantities", "Late-night eating (after 8 PM)"], "hi": ["मैदा उत्पाद (ब्रेड, नान, बिस्किट, नमकीन)", "मीठे पेय (कोल्ड ड्रिंक, पैकेज्ड जूस)", "गहरे तले स्नैक्स (समोसा, पकोड़ा, चिप्स)", "पैकेज्ड और अल्ट्रा-प्रोसेस्ड खाद्य पदार्थ", "बड़ी मात्रा में सफेद चावल और आलू", "रात 8 बजे के बाद खाना"]},
    "home_remedies": {"en": ["Jeera water: Boil 1 tsp cumin in 2 glasses water, drink warm morning", "Lemon-honey warm water: 1 glass on empty stomach daily", "Green tea with ginger: 2-3 cups daily (no sugar)", "Triphala powder in warm water at night"], "hi": ["जीरे का पानी: 2 गिलास पानी में 1 चम्मच जीरा उबालें, सुबह गर्म पियें", "नींबू-शहद गर्म पानी: रोज़ खाली पेट 1 गिलास", "अदरक के साथ ग्रीन टी: दिन में 2-3 कप (बिना चीनी)", "रात में गर्म पानी में त्रिफला पाउडर"]},
